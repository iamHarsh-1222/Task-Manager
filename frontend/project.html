<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Project — TaskFlow</title>
  <link rel="stylesheet" href="css/style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
</head>
<body class="app-page">
  <nav class="navbar">
    <div class="nav-brand"><a href="dashboard.html" style="color:inherit;text-decoration:none">⚡ TaskFlow</a></div>
    <div class="nav-right">
      <span id="userBadge" class="user-badge"></span>
      <button onclick="logout()" class="btn-logout">Logout</button>
    </div>
  </nav>

  <div class="app-layout">
    <aside class="sidebar">
      <nav class="sidebar-nav">
        <a href="dashboard.html" class="nav-item">📊 Dashboard</a>
        <a href="project.html" class="nav-item active">📁 Project Board</a>
      </nav>
    </aside>

    <main class="main-content">
      <div class="project-header">
        <div>
          <h1 id="projectTitle">Loading...</h1>
          <p id="projectDesc" class="project-desc"></p>
        </div>
        <button class="btn-primary" onclick="openTaskModal()">+ Add Task</button>
      </div>

      <!-- KANBAN BOARD -->
      <div class="kanban-board">
        <div class="kanban-col">
          <div class="kanban-col-header todo">📋 Todo</div>
          <div class="kanban-tasks" id="col-Todo"></div>
        </div>
        <div class="kanban-col">
          <div class="kanban-col-header inprogress">🔄 In Progress</div>
          <div class="kanban-tasks" id="col-In Progress"></div>
        </div>
        <div class="kanban-col">
          <div class="kanban-col-header done">✅ Done</div>
          <div class="kanban-tasks" id="col-Done"></div>
        </div>
      </div>
    </main>
  </div>

  <!-- NEW TASK MODAL -->
  <div id="taskModal" class="modal hidden">
    <div class="modal-box">
      <h3>Create Task</h3>
      <form onsubmit="createTask(event)">
        <div class="form-group">
          <label>Task Title</label>
          <input type="text" id="taskTitle" required placeholder="e.g. Design homepage"/>
        </div>
        <div class="form-group">
          <label>Description</label>
          <textarea id="taskDesc" placeholder="Details..."></textarea>
        </div>
        <div class="form-group">
          <label>Assign To</label>
          <select id="taskAssign"><option value="">Unassigned</option></select>
        </div>
        <div class="form-group">
          <label>Priority</label>
          <select id="taskPriority">
            <option value="Low">Low</option>
            <option value="Medium" selected>Medium</option>
            <option value="High">High</option>
          </select>
        </div>
        <div class="form-group">
          <label>Due Date</label>
          <input type="date" id="taskDue"/>
        </div>
        <div class="modal-actions">
          <button type="button" onclick="closeModal('taskModal')" class="btn-secondary">Cancel</button>
          <button type="submit" class="btn-primary">Add Task →</button>
        </div>
      </form>
    </div>
  </div>

  <!-- EDIT TASK MODAL -->
  <div id="editTaskModal" class="modal hidden">
    <div class="modal-box">
      <h3>Update Task</h3>
      <input type="hidden" id="editTaskId"/>
      <div class="form-group">
        <label>Status</label>
        <select id="editTaskStatus">
          <option>Todo</option>
          <option>In Progress</option>
          <option>Done</option>
        </select>
      </div>
      <div class="form-group">
        <label>Priority</label>
        <select id="editTaskPriority">
          <option>Low</option>
          <option>Medium</option>
          <option>High</option>
        </select>
      </div>
      <div class="modal-actions">
        <button type="button" onclick="closeModal('editTaskModal')" class="btn-secondary">Cancel</button>
        <button onclick="updateTask()" class="btn-primary">Save →</button>
        <button onclick="deleteTask()" class="btn-danger" id="deleteTaskBtn" style="display:none">Delete</button>
      </div>
    </div>
  </div>

  <script src="js/project.js"></script>
</body>
</html>
